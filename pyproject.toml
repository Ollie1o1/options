[tool.pytest.ini_options]
testpaths = ["tests"]
# Put the repo root on sys.path before collection so `from src...` imports
# resolve regardless of invocation (`pytest` console script does not add cwd,
# unlike `python -m pytest`). Without this, the alphabetically-first test
# package collected (tests/breakout) fails with "No module named 'src'" because
# no earlier test has yet run its sys.path bootstrap → exit 2 on CI.
pythonpath = ["."]
# Live-network tests carry @pytest.mark.network and are deselected in CI with
# -m "not network". (Currently no test hits live network — the only HTTP-using
# test, test_polygon_client, fully mocks requests — but the marker is registered
# so the CI contract holds as soon as one is added.)
markers = [
    "network: test requires live network access (deselected in CI)",
]

[tool.ruff]
line-length = 120

[tool.ruff.lint]
# E402: Module level import not at top of file (used heavily for sys.path manipulation)
# F401: Unused imports (used heavily in try/except ImportError blocks)
# E701, E702: Multiple statements on one line (used heavily for brevity)
# E712: Equality comparisons to False (often used with pandas boolean series)
# E741: Ambiguous variable name (e.g. 'l')
# F601: Dictionary key literal repeated
ignore = ["E402", "F401", "E701", "E702", "E712", "E741", "F601"]
